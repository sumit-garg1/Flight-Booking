<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to PayU</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
            padding-top: 120px;
            margin: 0;
        }

        .card {
            background: white;
            color: #333;
            padding: 40px 30px;
            border-radius: 12px;
            width: 420px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        h2 {
            color: #0f2027;
            margin-bottom: 20px;
        }

        .amount {
            font-size: 28px;
            font-weight: bold;
            color: #e74c3c;
            margin: 15px 0;
        }

        .info {
            margin: 10px 0;
            font-size: 16px;
        }

        .loading {
            margin-top: 30px;
            font-size: 18px;
            color: #555;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background: #3498db;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Secure Payment via PayU</h2>

    <p class="info"><strong>Booking ID:</strong> #{{ payu_data.udf1 }}</p>
    <p class="amount">₹ {{ payu_data.amount }}</p>
    <p class="info"><strong>Email:</strong> {{ payu_data.email }}</p>

    <div class="loading">
        <div class="spinner"></div>
        <p>Please wait... Redirecting to PayU Secure Gateway</p>
    </div>

    <!-- fallback button -->
    <button class="btn" onclick="submitForm()">Click if not redirected</button>
</div>

<!-- PayU Form -->
<form id="payu_form" action="{{ action_url }}" method="post">
    {% for key, value in payu_data.items %}
        <input type="hidden" name="{{ key }}" value="{{ value }}">
    {% endfor %}
</form>

<script>
    function submitForm() {
        document.getElementById("payu_form").submit();
    }

    window.onload = function() {
        setTimeout(function() {
            submitForm();
        }, 1500);
    };
</script>

</body>
</html>
