{% load static %}

<nav id="navbar" class="bg-transparent py-4 px-6 flex justify-between items-center fixed top-0 left-0 w-full z-50 transition-all duration-300">
  
  <!-- Logo with Airline Focus -->
  <a href="{% url 'home' %}" class="flex items-center gap-2 group cursor-pointer">
    <div class="w-9 h-9 bg-gradient-to-br from-sky-500 to-blue-700 rounded-xl shadow-md flex items-center justify-center transform group-hover:scale-105 transition-transform duration-300">
      <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
      </svg>
    </div>
    <span class="text-xl font-bold bg-gradient-to-r from-gray-900 to-gray-700 bg-clip-text text-transparent">Aero<span class="text-sky-600">Book</span></span>
  </a>

  <!-- Nav Links (Right Side) - Airline Focused -->
  <div class="flex items-center gap-4">

    <!-- Flights Button (Primary Action) -->
    <a href="{% url 'home' %}" 
       class="nav-item flex items-center gap-2 px-5 py-2.5 rounded-xl bg-gradient-to-r from-sky-600 to-blue-700 hover:from-sky-700 hover:to-blue-800 text-white font-semibold shadow-lg hover:shadow-xl transition-all duration-300 transform hover:scale-105">
      <svg class="nav-icon w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
      </svg>
      <span class="nav-text">Flights</span>
    </a>

    <!-- My Bookings Button -->
    <a href="{% url 'my_bookings' %}" 
       class="nav-item hidden md:flex items-center gap-2 px-4 py-2 rounded-xl text-gray-700 hover:bg-gray-100 hover:text-sky-600 font-medium transition-all duration-200">
      <svg class="nav-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <span class="nav-text">My Bookings</span>
    </a>

    <!-- User Profile Dropdown -->
    <div class="relative group">
<button class="flex items-center gap-2 bg-white/90 backdrop-blur-sm px-3 py-2 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition-all group">
    
    <!-- Profile Circle -->
    <div class="w-8 h-8 bg-gradient-to-r from-sky-500 to-blue-600 rounded-full flex items-center justify-center">
        <span class="text-sm font-bold text-white">
            {{ request.user.first_name|default:request.user.username|slice:":1"|upper }}
        </span>
    </div>

    <!-- Username -->
    <span class="text-sm font-semibold text-gray-700 hidden sm:inline">
        {{ request.user.first_name|default:request.user.username }}
    </span>

    <!-- Arrow -->
    <svg class="w-4 h-4 text-gray-500 transition-transform duration-200 group-hover:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
    </svg>

</button>
      
      <!-- Dropdown Menu -->
      <div class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-xl border border-gray-100 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50">
        <a href="{% url 'login' %}" class="flex items-center gap-3 px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 rounded-t-xl">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          Login
        </a>
        <a href="{% url 'profile' %}" class="flex items-center gap-3 px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 rounded-t-xl">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          My Profile
        </a>
        <a href="{% url 'logout' %}" class="flex items-center gap-3 px-4 py-3 text-sm text-red-600 hover:bg-red-50 rounded-b-xl border-t border-gray-100">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
          Sign Out
        </a>
      </div>
    </div>

    <!-- Mobile Menu Button -->
    <button id="mobileMenuBtn" class="md:hidden flex items-center justify-center w-10 h-10 rounded-xl bg-white/80 backdrop-blur-sm shadow-sm">
      <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
  </div>
</nav>

<!-- Mobile Menu Panel -->
<div id="mobileMenu" class="fixed inset-0 bg-white z-40 transform translate-x-full transition-transform duration-300 ease-in-out md:hidden">
  <div class="flex flex-col h-full pt-20 px-6">
    <div class="flex items-center gap-3 pb-6 mb-4 border-b border-gray-100">
      <div class="w-12 h-12 bg-gradient-to-r from-sky-500 to-blue-600 rounded-full flex items-center justify-center">
        <span class="text-lg font-bold text-white">JD</span>
      </div>
      <div>
        <p class="font-semibold text-gray-900">John Doe</p>
        <p class="text-sm text-gray-500">john@example.com</p>
      </div>
    </div>
    
    <a href="{% url 'home' %}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-700 hover:bg-gray-50 font-medium transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
      </svg>
      Flights
    </a>
    <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-700 hover:bg-gray-50 font-medium transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      My Bookings
    </a>
    <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-700 hover:bg-gray-50 font-medium transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M6 14h6m-6 4h12M5 4h14a2 2 0 012 2v12a2 2 0 01-2 2H5a2 2 0 01-2-2V6a2 2 0 012-2z"/>
      </svg>
      Check-in
    </a>
    <div class="mt-auto pt-6 border-t border-gray-100">
      <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-red-600 hover:bg-red-50 font-medium transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Sign Out
      </a>
    </div>
  </div>
</div>

<script>
  const navbar = document.getElementById('navbar');
  const mobileMenuBtn = document.getElementById('mobileMenuBtn');
  const mobileMenu = document.getElementById('mobileMenu');
  const navItems = document.querySelectorAll('.nav-item');

  // Navbar scroll background change
  window.addEventListener('scroll', () => {
    if (window.scrollY > 50) {
      navbar.classList.add('bg-white', 'shadow-md');
      navbar.classList.remove('bg-transparent');
    } else {
      navbar.classList.add('bg-transparent');
      navbar.classList.remove('bg-white', 'shadow-md');
    }
  });

  // Mobile menu toggle
  if (mobileMenuBtn && mobileMenu) {
    mobileMenuBtn.addEventListener('click', () => {
      mobileMenu.classList.toggle('translate-x-full');
      document.body.style.overflow = mobileMenu.classList.contains('translate-x-full') ? '' : 'hidden';
    });
    
    // Close mobile menu when clicking on a link
    mobileMenu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        mobileMenu.classList.add('translate-x-full');
        document.body.style.overflow = '';
      });
    });
  }

  // Close mobile menu on escape key
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && mobileMenu && !mobileMenu.classList.contains('translate-x-full')) {
      mobileMenu.classList.add('translate-x-full');
      document.body.style.overflow = '';
    }
  });

  // Active link highlighting
  const currentPath = window.location.pathname;
  navItems.forEach(item => {
    const link = item.closest('a');
    if (link && link.getAttribute('href') === currentPath) {
      if (item.classList.contains('bg-gradient-to-r')) {
        // Already has primary button styling
      } else {
        item.classList.add('text-sky-600', 'bg-sky-50');
      }
    }
  });

  // Change icon and text color on click for mobile only
  navItems.forEach(item => {
    item.addEventListener('click', (e) => {
      if (window.innerWidth < 768) {
        // Don't interfere with dropdown or mobile menu
        if (item.closest('.group') && item.closest('.group').querySelector('.group-hover\\:visible')) return;
        
        navItems.forEach(i => {
          const text = i.querySelector('.nav-text');
          const icon = i.querySelector('.nav-icon');
          if(text && !i.classList.contains('bg-gradient-to-r')) {
            text.classList.remove('text-sky-600');
            text.classList.add('text-gray-700');
          }
          if(icon && !i.classList.contains('bg-gradient-to-r')) {
            icon.classList.remove('text-sky-600');
            icon.classList.add('text-gray-700');
          }
        });
        
        const clickedText = item.querySelector('.nav-text');
        const clickedIcon = item.querySelector('.nav-icon');
        if(clickedText && !item.classList.contains('bg-gradient-to-r')) {
          clickedText.classList.add('text-sky-600');
        }
        if(clickedIcon && !item.classList.contains('bg-gradient-to-r')) {
          clickedIcon.classList.add('text-sky-600');
        }
      }
    });
  });
</script>
