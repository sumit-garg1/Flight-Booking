{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> | Book Flights, Hotels & Holidays</title>
  
  <!-- Meta Tags for SEO & Social Media -->
  <meta name="description" content="Book flights, hotels, holiday packages, trains, buses, cabs and more at best prices. Get exclusive deals and 24/7 customer support.">
  <meta name="keywords" content="flights, hotels, booking, travel, holidays, trains, buses">
  <meta name="author" content="FlightBook">
  <meta property="og:title" content="FlightBook | Book Flights, Hotels & Holidays">
  <meta property="og:description" content="Book flights, hotels, holiday packages at best prices. Exclusive deals available.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="{% static 'images/og-image.jpg' %}">
  <meta property="og:url" content="https://flightbook.com">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Travelle | Book Flights, Hotels & Holidays">
  <meta name="twitter:description" content="Book flights, hotels, holiday packages at best prices.">
  
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
  <link rel="apple-touch-icon" sizes="180x180" href="{% static 'apple-touch-icon.png' %}">
  
  <!-- Tailwind CSS CDN with Plugins -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Additional Tailwind Plugins -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio,line-clamp"></script>
  
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-Avb2QiuDEEvB4bZJYdft2mNjVShBftLdPG8FJ0V7irTLQ8Uo0qcPxh4Plq7G5tGm0rU+1SPhVotteLpBERwTkw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Custom CSS for Scrollbar & Animations -->
  <style>
    /* Smooth Scrolling */
    html {
      scroll-behavior: smooth;
    }
    
    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb {
      background: #3b82f6;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #2563eb;
    }
    
    /* Custom Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes shimmer {
      0% {
        background-position: -200% center;
      }
      100% {
        background-position: 200% center;
      }
    }
    
    @keyframes pulse-ring {
      0% {
        transform: scale(0.8);
        opacity: 0.8;
      }
      100% {
        transform: scale(1.2);
        opacity: 0;
      }
    }
    
    .animate-fadeInUp {
      animation: fadeInUp 0.5s ease-out;
    }
    
    .animate-shimmer {
      background: linear-gradient(90deg, 
        rgba(255,255,255,0) 0%, 
        rgba(255,255,255,0.8) 50%, 
        rgba(255,255,255,0) 100%);
      background-size: 200% auto;
      animation: shimmer 2s infinite linear;
    }
    
    .animate-pulse-ring {
      animation: pulse-ring 2s infinite;
    }
    
    /* Glass Morphism Effect */
    .glass {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    /* Gradient Text */
    .gradient-text {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    /* Loading Spinner */
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(59, 130, 246, 0.1);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
    
    /* Responsive Adjustments */
    @media (max-width: 640px) {
      .mobile-menu-hidden {
        display: none;
      }
      .mobile-menu-visible {
        display: block;
      }
    }
    
    /* Print Styles */
    @media print {
      .no-print {
        display: none !important;
      }
      body {
        font-size: 12pt;
        line-height: 1.5;
        color: #000;
        background: #fff;
      }
      a {
        color: #000;
        text-decoration: underline;
      }
    }
  </style>
  
  <!-- Tailwind Configuration -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          screens: {
            'xs': '400px',
            '3xl': '1920px',
          },
          colors: {
            primary: {
              50: '#eff6ff',
              100: '#dbeafe',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
              800: '#1e40af',
              900: '#1e3a8a',
            },
            secondary: {
              50: '#f8fafc',
              100: '#f1f5f9',
              800: '#1e293b',
              900: '#0f172a',
            },
            success: '#10b981',
            warning: '#f59e0b',
            danger: '#ef4444',
            info: '#3b82f6',
          },
          fontFamily: {
            'inter': ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            'poppins': ['Poppins', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
          animation: {
            'float': 'float 3s ease-in-out infinite',
            'bounce-slow': 'bounce 2s infinite',
            'ping-slow': 'ping 3s cubic-bezier(0, 0, 0.2, 1) infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' },
            }
          },
          boxShadow: {
            'neumorphism': '20px 20px 60px #d1d1d1, -20px -20px 60px #ffffff',
            'inner-lg': 'inset 0 2px 4px 0 rgba(0, 0, 0, 0.06)',
          },
          backgroundImage: {
            'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
            'gradient-conic': 'conic-gradient(from 180deg at 50% 50%, var(--tw-gradient-stops))',
          },
        },
      },
      plugins: [],
      darkMode: 'class',
    }
  </script>
  
  <!-- Google Analytics/GTM (Optional) -->
  <!--
  <script async src="https://www.googletagmanager.com/gtag/js?id=UA-XXXXXXXXX-X"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'UA-XXXXXXXXX-X');
  </script>
  -->
  
  <!-- PWA Support -->
  <!--
  <link rel="manifest" href="{% static 'manifest.json' %}">
  <meta name="theme-color" content="#2563eb">
  -->
</head>

<body class="bg-gradient-to-br from-gray-50 to-white font-inter min-h-screen flex flex-col transition-colors duration-300">
  
  {% include 'nav.html' %}
  
  <!-- Main Content Block -->
  <main class="flex-1" id="main-content">
    {% block content %}
    <!-- Content will be injected here by Django templates -->
    {% endblock %}
  </main>

  <!-- Footer -->
  {% include 'footer.html' %}

  <!-- Toast Notification Container -->
  <div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2"></div>

  <!-- Loading Overlay -->
  <div id="loading-overlay" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center">
    <div class="bg-white rounded-xl p-8 flex flex-col items-center gap-4">
      <div class="spinner"></div>
      <p class="text-gray-700 font-medium">Loading...</p>
    </div>
  </div>

  <!-- Back to Top Button -->
  <button id="back-to-top" class="fixed bottom-8 right-8 w-12 h-12 bg-primary-600 text-white rounded-full shadow-lg hover:bg-primary-700 transition-all duration-300 opacity-0 transform translate-y-10 z-40 no-print">
    <i class="fas fa-arrow-up"></i>
  </button>

  <!-- Common JavaScript -->
  <script>
    // Back to Top Button
    const backToTopBtn = document.getElementById('back-to-top');
    
    window.addEventListener('scroll', () => {
      if (window.scrollY > 300) {
        backToTopBtn.classList.remove('opacity-0', 'translate-y-10');
        backToTopBtn.classList.add('opacity-100', 'translate-y-0');
      } else {
        backToTopBtn.classList.remove('opacity-100', 'translate-y-0');
        backToTopBtn.classList.add('opacity-0', 'translate-y-10');
      }
    });
    
    backToTopBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    
    // Toast Notification Function
    window.showToast = function(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      
      const colors = {
        success: 'bg-green-100 border-green-400 text-green-800',
        error: 'bg-red-100 border-red-400 text-red-800',
        warning: 'bg-yellow-100 border-yellow-400 text-yellow-800',
        info: 'bg-blue-100 border-blue-400 text-blue-800'
      };
      
      toast.className = `px-4 py-3 rounded-lg border ${colors[type]} animate-fadeInUp max-w-xs`;
      toast.innerHTML = `
        <div class="flex items-center gap-3">
          <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : type === 'warning' ? 'exclamation-triangle' : 'info-circle'}"></i>
          <span>${message}</span>
        </div>
      `;
      
      container.appendChild(toast);
      
      setTimeout(() => {
        toast.classList.add('opacity-0', 'transition-opacity', 'duration-300');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    };
    
    // Loading Overlay Functions
    window.showLoading = function() {
      document.getElementById('loading-overlay').classList.remove('hidden');
      document.getElementById('loading-overlay').classList.add('flex');
    };
    
    window.hideLoading = function() {
      document.getElementById('loading-overlay').classList.add('hidden');
      document.getElementById('loading-overlay').classList.remove('flex');
    };
    
    // Mobile Menu Toggle (can be used by child templates)
    window.toggleMobileMenu = function(menuId) {
      const menu = document.getElementById(menuId);
      menu.classList.toggle('hidden');
      menu.classList.toggle('mobile-menu-visible');
    };
    
    // Initialize on DOM Load
    document.addEventListener('DOMContentLoaded', () => {
      // Add active class to current nav item
      const currentPath = window.location.pathname;
      document.querySelectorAll('nav a').forEach(link => {
        if (link.getAttribute('href') === currentPath) {
          link.classList.add('text-primary-600', 'font-semibold');
          link.classList.remove('text-gray-600');
        }
      });
      
      // Auto-dismiss alerts after 5 seconds
      setTimeout(() => {
        document.querySelectorAll('.alert-auto-dismiss').forEach(alert => {
          alert.classList.add('opacity-0', 'transition-opacity', 'duration-300');
          setTimeout(() => alert.remove(), 300);
        });
      }, 5000);
      
      // Print functionality
      document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
          e.preventDefault();
          window.print();
        }
      });
    });
    
    // Error handling for images
    document.addEventListener('error', (e) => {
      if (e.target.tagName === 'IMG') {
        e.target.src = '{% static "images/placeholder.jpg" %}';
      }
    }, true);
  </script>
  
  {% block extra_js %}
  <!-- Additional JavaScript from child templates -->
  {% endblock %}
</body>
</html>
